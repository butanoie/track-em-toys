name: Bug Report
description: Report something that isn't working
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - api
        - web
        - ios
        - ml
        - shared
